name: public-safety

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  public-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run public-safety scan
        run: python3 scripts/check_public_safety.py
