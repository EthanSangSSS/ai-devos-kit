name: Flutter iOS CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  # Optional macOS simulator build. Enable only when runner cost is acceptable.
